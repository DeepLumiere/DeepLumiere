<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro - Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-shell" class="shell" style="display: none;">
    <!-- Sidebar injected via layout.js -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="topbar-title">Team</h2>
        <div class="flex items-center gap-4">
          <button class="btn btn-primary" onclick="openTicketModal()"><i data-lucide="plus"></i> New Task</button>
        </div>
      </header>
      <div class="view-container">
        <div id="view-team" class="view active">
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
            <!-- Subteams List -->
            <div>
              <div class="flex justify-between items-center" style="margin-bottom: 24px;">
                <h3><i data-lucide="network" style="display:inline-block; vertical-align: middle; margin-right:8px;"></i> Subteams</h3>
                <button class="btn btn-primary btn-sm admin-only" onclick="openSubteamModal()" id="btn-add-subteam"><i data-lucide="plus"></i> Add Subteam</button>
              </div>
              <div class="data-table-wrapper">
                <table class="data-table">
                  <thead><tr><th>Subteam Name</th><th>Description</th><th>Actions</th></tr></thead>
                  <tbody id="subteams-table-body"></tbody>
                </table>
              </div>
            </div>
            
            <!-- Users List -->
            <div>
              <div class="flex justify-between items-center" style="margin-bottom: 24px;">
                <h3><i data-lucide="users" style="display:inline-block; vertical-align: middle; margin-right:8px;"></i> Organization Members</h3>
                <button class="btn btn-primary btn-sm admin-only" onclick="openTeamModal()" id="btn-add-member"><i data-lucide="user-plus"></i> Invite Member</button>
              </div>
              <div class="data-table-wrapper">
                <table class="data-table">
                  <thead><tr><th>Name</th><th>Role</th><th>Subteam</th><th>Actions</th></tr></thead>
                  <tbody id="team-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <div id="modals-container"></div>
  <div id="toast-container"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
