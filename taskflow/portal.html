<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Portal - TaskFlow Pro</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

  <div id="portal-screen" class="centered-screen" style="max-width: 800px; width: 100%;">
    <div style="text-align: center; margin-bottom: 32px;">
      <i data-lucide="layers" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 16px;"></i>
      <h1 id="portal-welcome" style="margin-bottom: 8px;">Client Portal</h1>
      <p class="text-muted">Submit a new request or view your existing tickets.</p>
    </div>

    <!-- Ticket Submission Form -->
    <div id="portal-form-container" class="project-header-card" style="margin-bottom: 32px;">
      <h3 style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;"><i data-lucide="plus-circle"></i> New Request</h3>
      
      <div class="flex gap-4" style="margin-bottom: 16px;">
        <div class="form-group" style="flex:1;">
          <label class="form-label">Your Name <span style="color:var(--priority-crit);">*</span></label>
          <input type="text" class="input" id="portal-name" placeholder="John Doe">
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label">Email Address <span style="color:var(--priority-crit);">*</span></label>
          <input type="email" class="input" id="portal-email" placeholder="john@example.com">
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 16px;">
        <label class="form-label">Request Title <span style="color:var(--priority-crit);">*</span></label>
        <input type="text" class="input" id="portal-title" placeholder="Brief summary of your request">
      </div>
      
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label">Description / Details</label>
        <textarea class="textarea" id="portal-desc" rows="5" placeholder="Provide as much detail as possible..."></textarea>
      </div>
      
      <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="submitPortalTicket()">
        <i data-lucide="send"></i> Submit Request
      </button>
    </div>

    <!-- Success Message -->
    <div id="portal-success-container" class="project-header-card" style="display: none; text-align: center; margin-bottom: 32px; border: 1px solid var(--status-done);">
      <div style="width: 64px; height: 64px; border-radius: 50%; background: rgba(56, 189, 248, 0.1); color: var(--status-done); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
        <i data-lucide="check" style="width: 32px; height: 32px;"></i>
      </div>
      <h2>Request Submitted!</h2>
      <p class="text-muted" style="margin: 16px 0;">Your request has been received. Your reference ID is: <strong id="portal-ref-id" style="color: var(--text);"></strong></p>
      <button class="btn btn-ghost" onclick="document.getElementById('portal-success-container').style.display='none'; document.getElementById('portal-form-container').style.display='block';">
        <i data-lucide="plus"></i> Submit Another
      </button>
    </div>

    <!-- Existing Tickets List -->
    <div class="project-header-card">
      <h3 style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;"><i data-lucide="list"></i> Your Requests</h3>
      <div id="portal-tickets-list">
        <p class="text-muted" style="font-size: 14px; text-align: center; padding: 32px 0;">Loading your requests...</p>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
