<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro - Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-shell" class="shell" style="display: none;">
    <!-- Sidebar injected via layout.js -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="topbar-title">Kanban</h2>
        <div class="flex items-center gap-4">
          <button class="btn btn-primary" onclick="openTicketModal()"><i data-lucide="plus"></i> New Task</button>
        </div>
      </header>
      <div class="view-container">
        <div id="view-kanban" class="view active">
<div style="margin-bottom: 24px;" class="flex gap-4">
            <select class="select" id="kanban-project-filter" style="width: 240px; background: var(--surface);" onchange="renderKanban()">
              <option value="all">All Projects & Tasks</option>
              <option value="unassigned">Personal / Unassigned</option>
            </select>
          </div>
          <div class="kanban-board" id="kanban-board">
            <!-- Columns rendered via JS -->
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <div id="modals-container"></div>
  <div id="toast-container"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
