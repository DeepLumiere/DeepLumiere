<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal — TaskFlow</title>
  <meta name="description" content="View task progress" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/portal.css" />
</head>
<body>

  <!-- Loading State -->
  <div id="portal-loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--color-bg); z-index: 100;">
    <div style="width: 40px; height: 40px; border: 3px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.7s linear infinite;"></div>
  </div>

  <header class="portal-header hidden" id="portal-header">
    <img src="" alt="Logo" class="portal-logo" id="portal-logo" />
    <h1 class="portal-title" id="portal-title">Client Portal</h1>
    <span class="portal-subtitle" id="portal-subtitle">Shared via TaskFlow</span>
  </header>

  <main class="portal-content hidden" id="portal-content">
    <div class="portal-board" id="portal-board">
      
      <!-- Todo Column -->
      <div class="portal-column">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--color-border-subtle); padding-bottom: 8px;">
          <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-muted);"></div>
          <span style="font-size: 13px; font-weight: 600;">To Do</span>
          <span style="font-size: 11px; color: var(--color-text-muted); background: var(--color-surface-3); padding: 2px 8px; border-radius: 12px;" id="count-todo">0</span>
        </div>
        <div id="col-todo" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>

      <!-- In Progress Column -->
      <div class="portal-column">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--color-border-subtle); padding-bottom: 8px;">
          <div style="width: 8px; height: 8px; border-radius: 50%; background: hsl(221, 83%, 53%);"></div>
          <span style="font-size: 13px; font-weight: 600;">In Progress</span>
          <span style="font-size: 11px; color: var(--color-text-muted); background: var(--color-surface-3); padding: 2px 8px; border-radius: 12px;" id="count-in-progress">0</span>
        </div>
        <div id="col-in-progress" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>

      <!-- Review Column -->
      <div class="portal-column">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--color-border-subtle); padding-bottom: 8px;">
          <div style="width: 8px; height: 8px; border-radius: 50%; background: hsl(262, 80%, 62%);"></div>
          <span style="font-size: 13px; font-weight: 600;">In Review</span>
          <span style="font-size: 11px; color: var(--color-text-muted); background: var(--color-surface-3); padding: 2px 8px; border-radius: 12px;" id="count-review">0</span>
        </div>
        <div id="col-review" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>

      <!-- Done Column -->
      <div class="portal-column">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--color-border-subtle); padding-bottom: 8px;">
          <div style="width: 8px; height: 8px; border-radius: 50%; background: hsl(145, 63%, 42%);"></div>
          <span style="font-size: 13px; font-weight: 600;">Done</span>
          <span style="font-size: 11px; color: var(--color-text-muted); background: var(--color-surface-3); padding: 2px 8px; border-radius: 12px;" id="count-done">0</span>
        </div>
        <div id="col-done" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>

    </div>
  </main>

  <div class="portal-error hidden" id="portal-error">
    <div class="portal-error__icon">🔒</div>
    <h2 class="portal-error__title">Link Expired or Invalid</h2>
    <p class="portal-error__desc">This portal link is no longer active. Please contact your project manager for a new link.</p>
  </div>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script type="module" src="js/portal.js"></script>
</body>
</html>
