<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-shell" class="shell" style="display: none;">
    <!-- Sidebar injected via layout.js -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="topbar-title">Dashboard</h2>
        <div class="flex items-center gap-4">
          <button class="btn btn-primary" onclick="openTicketModal()"><i data-lucide="plus"></i> New Task</button>
        </div>
      </header>
      <div class="view-container">
        <div id="view-dashboard" class="view active">
<div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Open Tasks</div>
              <div class="stat-value" id="stat-open">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">In Progress</div>
              <div class="stat-value" id="stat-prog">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Client Submissions</div>
              <div class="stat-value" style="color: var(--primary);" id="stat-portal">0</div>
            </div>
          </div>
          
          <h3 style="margin-bottom: 20px;">Client Triage Queue</h3>
          <div id="triage-queue-content">
             <!-- Triage queue rendered here -->
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <div id="modals-container"></div>
  <div id="toast-container"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
