<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="login-screen" class="centered-screen" style="display: none;">
    <div class="centered-card">
      <div style="text-align:center; margin-bottom: 24px;"><i data-lucide="layers" style="width:48px; height:48px; color:var(--primary);"></i></div>
      <h1>TaskFlow Pro</h1>
      <p>Sign in to manage your tickets and projects</p>
      <button id="btn-login" class="btn btn-primary" style="width: 100%; font-size: 15px; padding: 14px;"><i data-lucide="log-in"></i> Sign in with Google</button>
      <div id="login-error" style="color: #f06565; margin-top: 16px; font-size: 13px; display: none; text-align:center;"></div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
