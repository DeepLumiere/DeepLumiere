<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --serif:'Cormorant Garant',Georgia,serif;
  --mono:'DM Mono','Courier New',monospace;
  --sans:'Outfit',system-ui,sans-serif;
}
body{font-family:var(--sans)}
[data-theme="dark"]{
  --bg:#080a10;
  --bg2:#0c0f1c;
  --line:#1a1e30;
  --muted:#8a9ac4;
  --body:#c8d0e8;
  --text:#eef0fa;
  --accent:#7eb8f7;
  --accent2:#4a80d4;
  --accent-s:rgba(126,184,247,.10);
  --accent-b:rgba(126,184,247,.22);
  --t-bg:#0e1122;
  --t-border:#1c2244;
  --t-text:#5a6888;
}
[data-theme="light"]{
  --bg:#f6f7fc;
  --bg2:#eef0f8;
  --line:#d0d4ec;
  --muted:#69779e;
  --body:#2c3454;
  --text:#0a0e24;
  --accent:#1a3bcc;
  --accent2:#2a54e8;
  --accent-s:rgba(26,59,204,.07);
  --accent-b:rgba(26,59,204,.18);
  --t-bg:#e8eaf6;
  --t-border:#c4cae8;
  --t-text:#6070a0;
}

/* ── SCROLL CONTAINER ─────────────────────── */
html,body{height:100%;overflow:hidden;background:var(--bg)}
#scroller{
  height:100vh;
  overflow-y:hidden;
  overflow-x:hidden;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

/* ── LAVA LAMP BLOBS ──────────────────────── */
.bg-blobs{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}
/* transition: background for colour surprises, filter for glow changes */
.blob{
  position:absolute;
  filter:blur(80px);
  will-change:transform,border-radius;
  transition:background 2.8s ease, filter 1.2s ease;
}

/* Default colours per theme — JS overrides inline for surprises */
[data-theme="dark"] .blob.c1{background:rgba(126,184,247,.35)}
[data-theme="dark"] .blob.c2{background:rgba(74,128,212,.30)}
[data-theme="dark"] .blob.c3{background:rgba(138,154,196,.28)}
[data-theme="light"] .blob.c1{background:rgba(26,59,204,.15)}
[data-theme="light"] .blob.c2{background:rgba(42,84,232,.13)}
[data-theme="light"] .blob.c3{background:rgba(105,119,158,.11)}

/* Float animations — CSS translate property (parallax) composes with these */
.blob:nth-child(1){width:40vw;height:40vw;left:5vw;
  animation:rise1 28s linear infinite,morph 9s ease-in-out infinite alternate;}
.blob:nth-child(2){width:30vw;height:30vw;left:55vw;
  animation:rise2 22s linear infinite,morph 11s ease-in-out infinite alternate;
  animation-delay:-9s,-3s;}
.blob:nth-child(3){width:35vw;height:35vw;left:22vw;
  animation:rise3 34s linear infinite,morph 7s ease-in-out infinite alternate;
  animation-delay:-18s,-5s;}
.blob:nth-child(4){width:28vw;height:28vw;left:68vw;
  animation:rise4 19s linear infinite,morph 13s ease-in-out infinite alternate;
  animation-delay:-5s,-2s;}
.blob:nth-child(5){width:45vw;height:45vw;left:30vw;
  animation:rise5 38s linear infinite,morph 10s ease-in-out infinite alternate;
  animation-delay:-25s,-7s;}

@keyframes rise1{
  0%  {transform:translateY(120vh) translateX(0)    rotate(0deg)  scale(1)}
  100%{transform:translateY(-130vh) translateX(6vw)  rotate(40deg) scale(.85)}
}
@keyframes rise2{
  0%  {transform:translateY(120vh) translateX(0)    rotate(0deg)   scale(1)}
  100%{transform:translateY(-130vh) translateX(-9vw) rotate(-45deg) scale(.9)}
}
@keyframes rise3{
  0%  {transform:translateY(120vh) translateX(0)    rotate(0deg)  scale(1)}
  100%{transform:translateY(-130vh) translateX(12vw) rotate(30deg) scale(.8)}
}
@keyframes rise4{
  0%  {transform:translateY(120vh) translateX(0)    rotate(0deg)   scale(1)}
  100%{transform:translateY(-130vh) translateX(-5vw) rotate(-30deg) scale(.95)}
}
@keyframes rise5{
  0%  {transform:translateY(120vh) translateX(0)   rotate(0deg)  scale(1)}
  100%{transform:translateY(-130vh) translateX(8vw) rotate(20deg) scale(.88)}
}
@keyframes morph{
  0%  {border-radius:40% 60% 70% 30% / 40% 40% 60% 50%}
  34% {border-radius:70% 30% 50% 50% / 30% 30% 70% 70%}
  67% {border-radius:100% 60% 60% 100% / 100% 100% 60% 60%}
  100%{border-radius:40% 60% 70% 30% / 40% 40% 60% 50%}
}

/* ── SVG NAME — JS owns opacity entirely, no CSS transition ── */
#intro-name-svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  opacity:0;          /* JS sets this every frame */
  overflow:visible;
}
#svg-name{
  font-family:var(--serif);
  font-weight:400;
  fill:var(--text);
  text-rendering:geometricPrecision;
  font-kerning:auto;
  transition:fill .4s;
}
#svg-name-accent{
  fill:var(--accent);
  font-style:italic;
  transition:fill .4s;
}
[data-theme="dark"] #intro-name-svg{
  filter:drop-shadow(0 0 28px rgba(126,184,247,.18));
}
[data-theme="light"] #intro-name-svg{
  filter:drop-shadow(0 0 18px rgba(26,59,204,.12));
}

/* ── CLICK RIPPLE RING ────────────────────── */
/* (rings removed — blob interaction handles all feedback) */

/* ── INTRO SECTION ────────────────────────── */
#intro{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  z-index:1;
}
#intro-canvas{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  pointer-events:none;
  z-index:2;
}

/* Scroll hints */
#hint{
  position:absolute;
  bottom:36px;left:50%;
  transform:translateX(-50%);
  font-family:var(--mono);
  font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);
  z-index:10;white-space:nowrap;
  animation:breathe 2.5s ease-in-out infinite;
  transition:opacity .4s;
  pointer-events:none;
}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.85}}

#scroll-hint{
  position:absolute;
  bottom:36px;left:50%;
  transform:translateX(-50%);
  font-family:var(--mono);
  font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--accent);
  z-index:10;white-space:nowrap;
  opacity:0;
  pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:opacity .6s;
}
#scroll-hint .arr-down{
  width:1px;height:28px;
  background:var(--accent);
  animation:dropLine 1.4s ease-in-out infinite;
  transform-origin:top;
}
@keyframes dropLine{0%,100%{transform:scaleY(0);opacity:0}50%{transform:scaleY(1);opacity:.7}}

/* ── STICKY NAV ───────────────────────────── */
#nav{
  position:sticky;
  top:0;
  z-index:100;
  height:0;
  overflow:visible;
}
#nav-inner{
  display:flex;
  align-items:center;
  gap:14px;
  padding:20px 32px;
  background:transparent;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid transparent;
  opacity:0;
  transition:border-color .4s;
  pointer-events:none;
}
#nav-inner.show-border{border-color:var(--line)}
#nav-chip-ring{
  width:32px;height:32px;
  border-radius:50%;
  overflow:hidden;
  border:1.5px solid var(--accent-b);
  flex-shrink:0;
}
#nav-chip-ring img{width:100%;height:100%;object-fit:cover}
#nav-name{
  font-family:var(--serif);
  font-size:18px;
  font-weight:400;
  color:var(--text);
  opacity:0;
  transition:color .4s;
}
#nav-name em{font-style:italic;color:var(--accent)}

/* ── CV PAGE ─────────────────────────────── */
#cv{
  background:transparent;
  min-height:100vh;
  position:relative;
  z-index:1;
}
.wrap{max-width:1040px;margin:0 auto;padding:60px 32px 100px}

.intro-quote{
  margin-top:60px;margin-bottom:60px;
  max-width:600px;
  padding-left:24px;
  border-left:2px solid var(--accent-b);
  transition:border-color .4s;
}
.about-text{
  font-family:var(--serif);font-size:1.35rem;font-style:italic;font-weight:400;
  color:var(--muted);line-height:1.8;transition:color .4s;
  letter-spacing:0.01em;
}

/* Body columns */
.body-cols{display:grid;grid-template-columns:252px 1fr;gap:0 52px;align-items:start}
.sidebar{position:sticky;top:90px;display:flex;flex-direction:column;gap:36px}

.s-label{
  display:block;font-family:var(--mono);font-size:.6rem;
  letter-spacing:.3em;text-transform:uppercase;
  color:var(--accent);margin-bottom:14px;transition:color .4s;
}
.s-row{display:flex;flex-direction:column;gap:10px}
.s-item{display:flex;flex-direction:column;gap:3px}
.s-item-label{font-family:var(--mono);font-size:.59rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);transition:color .4s}
.s-item-value{font-family:var(--sans);font-size:.88rem;color:var(--body);transition:color .4s}

.cgpa-badge{
  display:inline-flex;flex-direction:column;gap:2px;
  background:var(--accent-s);border:1px solid var(--accent-b);
  border-radius:6px;padding:9px 14px;margin-top:4px;width:fit-content;
  transition:background .4s,border-color .4s;
}
.cgpa-num{font-family:var(--mono);font-size:1.4rem;font-weight:500;color:var(--accent);line-height:1;transition:color .4s}
.cgpa-of{font-family:var(--mono);font-size:.57rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;transition:color .4s}

.focus-tags{display:flex;flex-direction:column}
.focus-tag{
  display:flex;align-items:center;gap:10px;
  font-family:var(--sans);font-size:.85rem;color:var(--body);
  padding:7px 0;border-bottom:1px solid var(--line);
  transition:color .18s,border-color .4s;
}
.focus-tag:last-child{border-bottom:none}
.focus-tag:hover{color:var(--text)}
.focus-tag::before{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:background .4s}

.sidebar-links{display:flex;flex-direction:column}
.sidebar-link{
  font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;
  color:var(--body);
  display:flex;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--line);transition:color .18s,border-color .4s;
}
.sidebar-link:last-child{border-bottom:none}
.sidebar-link:hover{color:var(--accent);text-decoration:none}
.sidebar-link .arr{margin-left:auto;font-size:.65rem;opacity:.28;transition:opacity .18s,transform .18s}
.sidebar-link:hover .arr{opacity:1;transform:translate(2px,-2px)}

/* Main content */
.main-col{display:flex;flex-direction:column;gap:56px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;padding-bottom:10px;border-bottom:1px solid var(--line);transition:border-color .4s}
.sec-title{font-family:var(--sans);font-size:1.1rem;font-weight:500;color:var(--text);letter-spacing:.01em;line-height:1;transition:color .4s}
.sec-num{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--muted);transition:color .4s}
.cv-item{padding:22px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:124px 1fr;gap:0 28px;align-items:start;transition:border-color .4s}
.cv-item:last-child{border-bottom:none;padding-bottom:0}
.cv-date{font-family:var(--mono);font-size:.63rem;letter-spacing:.05em;color:var(--muted);line-height:1.6;padding-top:4px;transition:color .4s}
.cv-role{font-family:var(--sans);font-size:1rem;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px;transition:color .4s}
.cv-org{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;transition:color .4s}
.cv-desc{font-family:var(--sans);color:var(--body);font-size:.9rem;font-weight:300;line-height:1.75;transition:color .4s}
.cv-list{list-style:none;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.cv-list li{font-family:var(--sans);font-size:.88rem;font-weight:300;color:var(--body);padding-left:14px;position:relative;line-height:1.6;transition:color .4s}
.cv-list li::before{content:'—';position:absolute;left:0;color:var(--muted);font-size:.72rem;top:2px}
.pub-venue{display:inline-block;margin-bottom:8px;font-family:var(--mono);font-size:.61rem;letter-spacing:.17em;text-transform:uppercase;color:var(--accent);background:var(--accent-s);padding:3px 9px;border-radius:4px;transition:background .4s,color .4s}
.paper-link{display:inline-flex;align-items:center;margin-top:10px;font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;color:var(--muted);border:1px solid var(--line);padding:6px 11px;border-radius:4px;transition:border-color .4s,color .4s}
.paper-link:hover{color:var(--text);border-color:var(--muted);text-decoration:none}
.paper-link::after{content:' ↗';font-size:.62rem}

footer{padding:28px 32px 44px;max-width:1040px;margin:0 auto;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;transition:border-color .4s}
footer span{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:var(--muted);transition:color .4s}

/* ── THEME BUTTON ────────────────────────── */
.theme-btn{
  position:fixed;top:18px;right:28px;z-index:300;
  display:flex;align-items:center;gap:8px;padding:7px 14px;
  border-radius:999px;background:var(--t-bg);border:1px solid var(--t-border);
  color:var(--t-text);font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;transition:background .4s,border-color .2s,color .2s;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.theme-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);transition:box-shadow .2s,background .4s}
.theme-btn:hover .dot{box-shadow:0 0 8px var(--accent)}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:840px){
  .body-cols{grid-template-columns:1fr}
  .sidebar{position:static;top:0}
  .theme-btn{top:14px;right:16px}
  #nav-inner{padding:14px 20px}
}
@media(max-width:540px){
  .wrap{padding:40px 18px 80px}
  footer{padding:24px 18px 40px}
  .cv-item{grid-template-columns:1fr;gap:5px 0}
  .cv-date{padding-top:0}
  .intro-quote{margin-top:40px;margin-bottom:50px}
  .about-text{font-size:1.4rem}
}
</style>

/** Escape HTML-special characters (prevents XSS, handles entities). */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function renderItem(item) {

    <div>`;
  if (item.venue) h += `<span class="pub-venue">${esc(item.venue)}</span>`;
  h += `<p class="cv-role">${esc(item.role)}</p>`;
  if (item.org) h += `<p class="cv-org">${esc(item.org)}</p>`;
  if (item.desc) {

    h += `<p class="cv-desc"${mt}>${esc(item.desc)}</p>`;

  if (item.bullets && item.bullets.length) {
    h += `<ul class="cv-list">${item.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;

  h += `</div></div>`;
  return h;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   §4  INTERACTIVE BACKGROUND
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ─ §4a  Mouse-parallax blobs ─────────────────────────────── */
/*
  The CSS `translate` individual-transform property composes WITH the
  CSS `transform` animation (rise1…rise5) without interfering.
  Each blob has a different strength to simulate depth layers.
*/
const blobs = Array.from(document.querySelectorAll('.blob'));
const PARALLAX_STR = [22, -15, 9, -20, 13]; /* px per half-viewport, per blob */

let targetMX = 0, targetMY = 0;
let smoothMX = 0, smoothMY = 0;

function onMouseMove(e) {
  targetMX = e.clientX / window.innerWidth  - 0.5;
  targetMY = e.clientY / window.innerHeight - 0.5;
}
window.addEventListener('mousemove',  onMouseMove);
window.addEventListener('touchmove', e => {
  if (e.touches[0]) onMouseMove(e.touches[0]);
}, { passive: true });


/* ─ §4b  Colorful blob surprises ──────────────────────────── */
/*
  Every 18–38 s a random blob quietly shifts hue then drifts back.
  Setting blob.style.background overrides the CSS class color;
  clearing it restores the theme default.
*/
const SURPRISE_COLORS = [
  'rgba(185,80,255,.34)',   /* vivid violet  */
  'rgba(255,65,140,.32)',   /* hot pink      */
  'rgba(55,220,175,.32)',   /* electric teal */
  'rgba(255,172,38,.30)',   /* amber         */
  'rgba(75,240,115,.28)',   /* electric mint */
  'rgba(255,95,75,.32)',    /* coral         */
  'rgba(100,200,255,.32)',  /* sky           */
];

let surprisedBlobIdx = -1;

function triggerBlobSurprise() {
  /* Pick a different blob than the last one surprised */
  let idx;
  do { idx = Math.floor(Math.random() * blobs.length); } while (idx === surprisedBlobIdx);
  surprisedBlobIdx = idx;

  const blob  = blobs[idx];
  const color = SURPRISE_COLORS[Math.floor(Math.random() * SURPRISE_COLORS.length)];

  blob.style.background = color;
  blob.style.filter     = 'blur(65px)'; /* slight focus-in as it brightens */

  const hold = 4500 + Math.random() * 4000; /* 4.5–8.5 s visible */
  setTimeout(() => {
    blob.style.background = ''; /* fall back to CSS class colour */
    blob.style.filter     = '';
    surprisedBlobIdx      = -1;
  }, hold);

  /* Schedule next surprise */
  setTimeout(triggerBlobSurprise, 18000 + Math.random() * 20000);
}

setTimeout(triggerBlobSurprise, 22000); /* first surprise after ~22 s */


/* ─ §4c  Click → blob interaction ────────────────────────── */
/*
  On click:
    • Find the topmost blob whose rendered bounds contain the click point.
    • If found → shift that blob's color and trigger a gentle pulse, then it
      breaks down (shrinks blur, then fades colour back to default).
    • If no blob nearby → spawn a temporary ephemeral blob at cursor that
      slowly drifts and dissolves.
    • Small canvas dot-burst at cursor in both cases (subtle, not explosive).
*/

const BLOB_COLORS = [
  'rgba(185,80,255,.38)',   /* violet  */
  'rgba(55,220,175,.36)',   /* teal    */
  'rgba(255,172,38,.34)',   /* amber   */
  'rgba(255,95,140,.36)',   /* pink    */
  'rgba(100,200,255,.36)',  /* sky     */
  'rgba(255,95,75,.34)',    /* coral   */
];

const RIPPLE_COLORS = [
  { r:126, g:184, b:247 },
  { r:185, g:120, b:255 },
  { r:55,  g:220, b:175 },
  { r:255, g:160, b:75  },
  { r:100, g:235, b:255 },
];

let rippleParticles = [];
let ephemeralBlobs  = []; /* temporary blobs spawned by click */

/* Hit-test: is (ex, ey) within the visible screen ellipse of the blob?
   Uses getBoundingClientRect so CSS transform animations are accounted for. */
function blobHit(blob, ex, ey) {
  const r  = blob.getBoundingClientRect();
  /* The blur spreads the visual well beyond the rect — use 70% half-dimensions
     so clicks anywhere visibly inside the glow register */
  const rx = r.width  * 0.70;
  const ry = r.height * 0.70;
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  const dx = ex - cx;
  const dy = ey - cy;
  return (dx*dx)/(rx*rx) + (dy*dy)/(ry*ry) <= 1;
}

function smallBurst(ex, ey, col) {
  const count = 18 + Math.floor(Math.random() * 10);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.8;
    const speed = 0.8 + Math.random() * 2.8;
    const c     = col || RIPPLE_COLORS[Math.floor(Math.random() * RIPPLE_COLORS.length)];
    rippleParticles.push({
      x: ex, y: ey,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life:  1,
      decay: 0.018 + Math.random() * 0.022,
      size:  1.2 + Math.random() * 2.4,
      r: c.r, g: c.g, b: c.b,
    });
  }
}

window.addEventListener('click', e => {
  const ex = e.clientX;
  const ey = e.clientY;

  /* Find first blob that is hit */
  let hitBlob = null;
  for (const b of blobs) {
    if (blobHit(b, ex, ey)) { hitBlob = b; break; }
  }

  if (hitBlob) {
    /* ── Blob hit: shift color then break down ── */
    const col  = BLOB_COLORS[Math.floor(Math.random() * BLOB_COLORS.length)];
    hitBlob.style.transition = 'background 0.6s ease, filter 0.6s ease, opacity 1.8s ease';
    hitBlob.style.background = col;
    hitBlob.style.filter     = 'blur(40px)'; /* tighten blur — "focus" */

    /* Extract color for burst */
    const m = col.match(/rgba\((\d+),(\d+),(\d+)/);
    const bc = m ? { r:+m[1], g:+m[2], b:+m[3] } : RIPPLE_COLORS[0];
    smallBurst(ex, ey, bc);

    /* After a beat, dissolve the color back */
    setTimeout(() => {
      hitBlob.style.transition = 'background 2.4s ease, filter 2.4s ease';
      hitBlob.style.background = '';
      hitBlob.style.filter     = '';
    }, 1200 + Math.random() * 800);

  } else {
    /* ── No blob hit: spawn an ephemeral blob at cursor ── */
    const col  = BLOB_COLORS[Math.floor(Math.random() * BLOB_COLORS.length)];
    const size = 180 + Math.random() * 120; /* px */
    const el   = document.createElement('div');
    el.style.cssText = [
      'position:fixed',
      `left:${ex - size/2}px`,
      `top:${ey - size/2}px`,
      `width:${size}px`,
      `height:${size}px`,
      'border-radius:50%',
      `background:${col}`,
      'filter:blur(60px)',
      'pointer-events:none',
      'z-index:0',
      'opacity:0',
      'transition:opacity .5s ease',
    ].join(';');
    document.getElementById('blob-container').appendChild(el);
    ephemeralBlobs.push(el);

    /* Fade in */
    requestAnimationFrame(() => { el.style.opacity = '1'; });

    /* Dissolve out after a moment */
    setTimeout(() => {
      el.style.transition = 'opacity 1.8s ease, filter 1.8s ease';
      el.style.opacity    = '0';
      el.style.filter     = 'blur(100px)';
      setTimeout(() => { el.remove(); ephemeralBlobs = ephemeralBlobs.filter(x => x !== el); }, 1900);
    }, 900 + Math.random() * 600);

    smallBurst(ex, ey, null);
  }
});


/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   §5  CANVAS INTRO ANIMATION  —  clean 4-state machine

   FORMING   → canvas only (avatar → particle explosion → name)
   CROSSFADE → canvas alpha = (1-t), SVG alpha = t  (always sum to 1)
   RESTING   → SVG only; opacity = direct linear scroll function
   PAST      → nav HTML name only  (RESTING ⇄ PAST on scroll-back)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* — Element refs — */
const scroller    = document.getElementById('scroller');
const introEl     = document.getElementById('intro');
const canvas      = document.getElementById('intro-canvas');
const ctx         = canvas.getContext('2d');
const hintEl      = document.getElementById('hint');
const scrollHint  = document.getElementById('scroll-hint');
const navInner    = document.getElementById('nav-inner');
const navNameSpan = document.getElementById('nav-name');
const svgNameEl   = document.getElementById('intro-name-svg');
const svgNameText = document.getElementById('svg-name');

/* — Sizing — */
let W = 0, H = 0, CX = 0, CY = 0, FR = 0;
let textStartX = 0, textCenterY = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
  FR = Math.min(W * .105, 115);
  if (imageLoaded && fontReady) setTimeout(rebuildTargets, 0);
}
window.addEventListener('resize', resize);

/* — Helpers — */
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function easeIO(t) { return t < .5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2; }

/* — Asset loading — */
let fontReady = false, imageLoaded = false, imgData = null;
const imgObj  = new Image();
imgObj.crossOrigin = 'anonymous';
imgObj.src         = SITE_DATA.person.avatar;
imgObj.onload      = () => { imageLoaded = true; checkReady(); };
imgObj.onerror     = () => { imageLoaded = true; checkReady(); };
document.fonts.ready.then(() => { fontReady = true; checkReady(); });

function checkReady() {
  if (imageLoaded && fontReady) resize();
}

/* — Particles — */
let particles = [];

function rebuildTargets() {
  /* ① Avatar circle → pixel colours */
  const iSize   = Math.floor(FR * 2);
  const iCanvas = document.createElement('canvas');
  iCanvas.width = iCanvas.height = iSize;
  const iCtx    = iCanvas.getContext('2d');
  const sSize   = Math.min(imgObj.width, imgObj.height);
  const sx      = (imgObj.width  - sSize) / 2;
  const sy      = (imgObj.height - sSize) / 2;
  iCtx.beginPath();
  iCtx.arc(iSize/2, iSize/2, iSize/2, 0, Math.PI * 2);
  iCtx.clip();
  try {
    iCtx.drawImage(imgObj, sx, sy, sSize, sSize, 0, 0, iSize, iSize);
    imgData = iCtx.getImageData(0, 0, iSize, iSize).data;
  } catch (_) {
    iCtx.fillStyle = '#445566'; iCtx.fill();
    imgData = iCtx.getImageData(0, 0, iSize, iSize).data;
  }

  /* ② Rasterise name text → pixel target positions */
  const HD_fs   = 160;
  const tCanvas = document.createElement('canvas');
  tCanvas.width  = 900;
  tCanvas.height = 260;
  const tCtx    = tCanvas.getContext('2d');
  tCtx.textBaseline = 'middle';

  tCtx.font = `400 ${HD_fs}px 'Cormorant Garant', Georgia, serif`;
  const w1  = tCtx.measureText('Deep ').width;
  tCtx.font = `italic 400 ${HD_fs}px 'Cormorant Garant', Georgia, serif`;
  const w2  = tCtx.measureText('Joshi').width;
  const totalW   = w1 + w2;
  const hdStartX = Math.floor(tCanvas.width / 2 - totalW / 2);
  const hdCY     = Math.floor(tCanvas.height / 2);

  tCtx.fillStyle = '#ff0000';
  tCtx.font      = `400 ${HD_fs}px 'Cormorant Garant', Georgia, serif`;
  tCtx.fillText('Deep ', hdStartX, hdCY);
  tCtx.fillStyle = '#0000ff';
  tCtx.font      = `italic 400 ${HD_fs}px 'Cormorant Garant', Georgia, serif`;
  tCtx.fillText('Joshi', hdStartX + w1, hdCY);

  const tData      = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height).data;
  const textPixels = [];
  const step       = 2;

  for (let y = 0; y < tCanvas.height; y += step) {
    for (let x = 0; x < tCanvas.width; x += step) {
      const idx = (y * tCanvas.width + x) * 4;
      if (tData[idx + 3] > 60) {
        textPixels.push({ x, y, isAccent: tData[idx + 2] > 128 });
      }
    }
  }
  window._pStep = step;

  /* ③ Display-scale geometry */
  const dispFS   = clamp(W * .086, 40, 84);
  const scale    = dispFS / HD_fs;
  textStartX     = W / 2 - (totalW * scale) / 2;
  textCenterY    = H / 2;

  /* ④ SVG font-size must exactly match particle render size for seamless crossfade */
  svgNameText.setAttribute('font-size', dispFS + 'px');

  /* ⑤ Build particles */
  particles = [];
  for (let i = 0; i < textPixels.length; i++) {
    const tp   = textPixels[i];
    const r    = Math.sqrt(Math.random()) * (iSize / 2);
    const th   = Math.random() * Math.PI * 2;
    const ix   = iSize / 2 + r * Math.cos(th);
    const iy   = iSize / 2 + r * Math.sin(th);
    const pIdx = (Math.floor(iy) * iSize + Math.floor(ix)) * 4;
    let ir = imgData[pIdx], ig = imgData[pIdx+1], ib = imgData[pIdx+2];
    if (imgData[pIdx + 3] < 10) { ir = 120; ig = 130; ib = 140; }
    const dist  = r / (iSize / 2);
    const delay = (1 - dist) * 0.4;
    particles.push({
      startX: CX - iSize/2 + ix,
      startY: CY - iSize/2 + iy,
      startR: ir, startG: ig, startB: ib,
      targetX: textStartX + (tp.x - hdStartX) * scale,
      targetY: textCenterY + (tp.y - hdCY) * scale,
      isAccent: tp.isAccent,
      delay,
    });
  }
}

/* ─────────────────────────────────────────────────────────────────
   STATE MACHINE
   'FORMING'   → canvas only (particle animation running)
   'CROSSFADE' → canvas fades out, SVG fades in (complements, sum=1)
   'RESTING'   → SVG only; opacity = direct linear scroll formula
   'PAST'      → nav HTML name only
   Transitions:
     FORMING    → CROSSFADE : prog reaches 1
     CROSSFADE  → RESTING   : crossfadeT reaches 1
     RESTING   ⇄ PAST       : scroll crosses H boundary
───────────────────────────────────────────────────────────────── */
let state      = 'FORMING';
let prog       = 0;
let crossfadeT = 0;
let mouseMoved = false;

const PROG_SPEED  = 0.022;   /* ~45 frames ≈ 0.75 s @ 60 fps */
const XFADE_SPEED = 0.040;   /* ~25 frames ≈ 0.42 s @ 60 fps */

function onUserInteraction() {
  if (!mouseMoved) {
    mouseMoved = true;
    hintEl.style.opacity = '0';
    setTimeout(() => hintEl.style.display = 'none', 500);
  }
}
window.addEventListener('wheel',      onUserInteraction, { passive: true });
window.addEventListener('touchstart', onUserInteraction, { passive: true });
introEl.addEventListener('mousemove', onUserInteraction);

/* ─ DRAW HELPERS ───────────────────────────────────────────── */
function drawParticles(alpha, tc, ac, dotSize) {
  if (alpha <= 0) return;
  ctx.globalAlpha = alpha;
  for (let i = 0; i < particles.length; i++) {
    const p  = particles[i];
    let pt   = clamp((prog - p.delay) / 0.5, 0, 1);
    pt       = easeIO(pt);
    if (pt === 0 && prog < 0.1) continue;
    const sx = p.startX + (p.targetX - p.startX) * pt;
    const sy = p.startY + (p.targetY - p.startY) * pt;
    if (sy < -10 || sy > H + 10) continue;
    const d = p.isAccent ? ac : tc;
    ctx.fillStyle = `rgb(${Math.round(p.startR+(d.r-p.startR)*pt)},${Math.round(p.startG+(d.g-p.startG)*pt)},${Math.round(p.startB+(d.b-p.startB)*pt)})`;
    ctx.fillRect(sx, sy, dotSize, dotSize);
  }
  ctx.globalAlpha = 1;
}

function drawRipples() {
  for (let i = rippleParticles.length - 1; i >= 0; i--) {
    const rp = rippleParticles[i];
    rp.x  += rp.vx; rp.y  += rp.vy;
    rp.vx *= 0.96;  rp.vy *= 0.96;
    rp.vy += 0.05;
    rp.life -= rp.decay;
    if (rp.life <= 0) { rippleParticles.splice(i, 1); continue; }
    ctx.globalAlpha = rp.life * rp.life;
    ctx.fillStyle   = `rgb(${rp.r},${rp.g},${rp.b})`;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.size * rp.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ─ MAIN DRAW LOOP ─────────────────────────────────────────── */
function draw() {
  requestAnimationFrame(draw);

  /* Blob parallax — always runs */
  smoothMX += (targetMX - smoothMX) * 0.04;
  smoothMY += (targetMY - smoothMY) * 0.04;
  blobs.forEach((b, i) => {
    const s = PARALLAX_STR[i] !== undefined ? PARALLAX_STR[i] : 10;
    b.style.translate = `${smoothMX * s}px ${smoothMY * s}px`;
  });

  ctx.clearRect(0, 0, W, H);
  drawRipples();   /* click particles always visible regardless of state */

  if (!fontReady || !imageLoaded || particles.length === 0) return;

  const scrollOffset = scroller.scrollTop;

  /* ── State transitions ── */
  if (state === 'FORMING') {
    if (mouseMoved) prog = Math.min(prog + PROG_SPEED, 1);
    if (prog >= 1) {
      state      = 'CROSSFADE';
      crossfadeT = 0;
      scrollHint.style.opacity = '1';
      scroller.style.overflowY = 'scroll';
    }
  }

  if (state === 'CROSSFADE') {
    crossfadeT = Math.min(crossfadeT + XFADE_SPEED, 1);
    if (crossfadeT >= 1) state = 'RESTING';
  }

  if (state === 'RESTING' && scrollOffset >= H) state = 'PAST';
  if (state === 'PAST'    && scrollOffset  < H) state = 'RESTING';

  /* ── Nav bar background — scroll driven, always ── */
  const navBgAlpha = scrollOffset >= H ? 1
    : scrollOffset > H - 90 ? (scrollOffset - (H - 90)) / 90
    : 0;
  navInner.style.opacity = navBgAlpha;
  navInner.classList.toggle('show-border', navBgAlpha >= 1);

  /* ── Theme colours ── */
  const tc = theme === 'dark' ? { r:238, g:240, b:250 } : { r:10,  g:14,  b:36  };
  const ac = theme === 'dark' ? { r:126, g:184, b:247 } : { r:26,  g:59,  b:204 };
  const dispFS  = clamp(W * .086, 40, 84);
  const dotSize = Math.max(0.6, (window._pStep || 2) * (dispFS / 180) * 1.4);

  /* ── Per-state rendering — exactly ONE name layer visible at any time ── */
  switch (state) {

    case 'FORMING': {
      /* Canvas only. Avatar fades out, particles build the name. */
      navNameSpan.style.opacity = '0';
      svgNameEl.style.opacity   = '0';

      if (prog < 1) {
        ctx.globalAlpha = Math.max(0, 1 - prog * 2.5);
        ctx.save();
        ctx.beginPath(); ctx.arc(CX, CY, FR, 0, Math.PI * 2); ctx.clip();
        const ss = Math.min(imgObj.width, imgObj.height);
        ctx.drawImage(imgObj,
          (imgObj.width-ss)/2, (imgObj.height-ss)/2, ss, ss,
          CX-FR, CY-FR, FR*2, FR*2);
        ctx.restore();
        ctx.globalAlpha = 1;
      }
      drawParticles(1, tc, ac, dotSize);
      break;
    }

    case 'CROSSFADE': {
      /* Canvas alpha + SVG alpha = 1.0 exactly. No double-visible name. */
      navNameSpan.style.opacity = '0';
      svgNameEl.style.opacity   = crossfadeT;
      drawParticles(1 - crossfadeT, tc, ac, dotSize);
      break;
    }

    case 'RESTING': {
      /* SVG only. Opacity = direct linear scroll — no lerp, no lag. */
      navNameSpan.style.opacity = '0';
      svgNameEl.style.opacity   = clamp(1 - scrollOffset / (H * 0.5), 0, 1);
      break;
    }

    case 'PAST': {
      /* Nav name only. */
      svgNameEl.style.opacity   = '0';
      navNameSpan.style.opacity = '1';
      break;
    }
  }

  if (scrollOffset > 10) scrollHint.style.opacity = '0';
}

requestAnimationFrame(draw);

})();
</script>
</body>
</html>
