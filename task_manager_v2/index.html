<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <meta name="description" content="TaskFlow — Professional team task management" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/kanban.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/notifications.css" />
</head>
<body>

  <!-- Loading screen (hidden after boot) -->
  <div id="app-loader" class="app-loader">
    <div class="app-loader__spinner"></div>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar__header" id="sidebar-header">
      <!-- Injected by sidebar.js -->
    </div>
    <nav class="sidebar__nav" id="sidebar-nav">
      <!-- Injected by sidebar.js -->
    </nav>
    <div class="sidebar__footer" id="sidebar-footer">
      <!-- Injected by sidebar.js -->
    </div>
    <button class="sidebar__collapse-btn" id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
  </aside>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- Topbar -->
  <header id="topbar" class="topbar">
    <button class="topbar__hamburger btn-icon" id="mobile-menu-btn" aria-label="Open menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16M4 6h16M4 18h16"/></svg>
    </button>
    
    <div class="topbar__search-wrap">
      <svg class="topbar__search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" class="topbar__search-input" id="global-search" placeholder="Search tasks... (Press '/')" autocomplete="off" />
      <div class="search-results hidden" id="search-results-panel"></div>
    </div>

    <div class="topbar__right">
      <button class="btn btn-primary" id="btn-new-task">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Task
      </button>

      <button class="notif-bell-btn" id="notif-bell" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="unread-badge hidden" id="notif-badge">0</span>
      </button>

      <div class="dropdown">
        <div class="avatar avatar-sm card-hover" id="topbar-avatar">
          <!-- Injected -->
        </div>
        <div class="dropdown-menu right" id="topbar-user-menu">
          <a href="#/profile" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item danger" id="btn-signout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign out
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Notification Dropdown Panel -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel__header">
      <span class="notif-panel__title">Notifications</span>
      <button class="btn btn-ghost btn-sm" id="btn-mark-all-read">Mark all as read</button>
    </div>
    <div class="notif-panel__body" id="notif-list">
      <!-- Injected -->
    </div>
    <div class="notif-panel__footer">
      <a href="#/notifications" class="btn btn-ghost btn-sm btn-block">View all notifications</a>
    </div>
  </div>

  <!-- Main View Container -->
  <main class="main-content" id="main-content">
    <!-- Injected by router.js -->
  </main>

  <!-- Task Detail Drawer -->
  <div class="drawer-overlay hidden" id="drawer-overlay"></div>
  <div class="task-drawer" id="task-drawer">
    <!-- Injected by taskDetail.js -->
  </div>

  <!-- Modal Portal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <!-- Injected by modals.js -->
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Entry Point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
